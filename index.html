<!DOCTYPE html>
<html>
  <head>
    <title>Facebook Page</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      .top {
        background: #3b5998;
        color: white;
      }
      .right {
        background: #f0f2f5;
        padding: 20px;
      }
      #main {
        margin-top: 110px;
      }
      #body {
        background-color: antiquewhite;
      }
    </style>
  </head>

  <body id="body">
    <!-- Navbar -->
    <div class="top py-4">
      <div class="container">
        <div class="row align-items-center">
          <!-- Logo -->
          <div class="col-md-6">
            <h2 class="m-0">Facebook</h2>
          </div>

          <!-- Login -->
          <div class="col-md-6">
            <div class="row g-1">
              <div class="col-5">
                <input
                  class="form-control form-control-sm"
                  placeholder="Email"
                />
              </div>

              <div class="col-5">
                <input
                  class="form-control form-control-sm"
                  type="password"
                  placeholder="Password"
                />
              </div>

              <div class="col-2">
                <button class="btn btn-light btn-sm w-100">Login</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main -->
    <div class="container" id="main">
      <div class="row">
        <!-- Left -->
        <div class="col-md-6 text-center">
          <h4>Facebook is useless without friends.</h4>
          <p>Make more friends.</p>
          <img
            src="cars-2-the-movie-disney-pixar-cars-wallpaper-preview.jpg"
            class="img-fluid"
          />
        </div>

        <!-- Right -->
        <div class="col-md-6 right">
          <h3>Create an Account</h3>
          <p>It's free and always will be.</p>

          <div class="row g-2">
            <div class="col">
              <input class="form-control" placeholder="First name" />
            </div>
            <div class="col">
              <input class="form-control" placeholder="Last name" />
            </div>
          </div>

          <input class="form-control mt-2" placeholder="Email" />
          <input class="form-control mt-2" placeholder="Password" />

          <button class="btn btn-success mt-3 w-100">Signup</button>
        </div>
      </div>
    </div>
  </body>
</html>
